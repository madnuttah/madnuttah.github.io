name: GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site
          cp index.html _site/
      
          git submodule foreach '
            mkdir -p "$toplevel/_site/$name"
            cp -r * "$toplevel/_site/$name" 2>/dev/null || true
            if [ ! -f "$toplevel/_site/$name/index.html" ]; then
              echo "<h1>$name</h1><p>No index.html found in this repo.</p>" > "$toplevel/_site/$name/index.html"
            fi
          '


      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
