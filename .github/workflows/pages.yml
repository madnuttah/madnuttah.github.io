name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site
          cp index.html _site/
      
          git submodule update --init --recursive
      
          for path in $(git config --file .gitmodules --get-regexp path | awk '{print $2}'); do
            name=$(basename "$path")
            mkdir -p "_site/$name"
            git -C "$path" archive HEAD | tar -x -C "_site/$name"
      
            if [ -f "_site/$name/README.md" ]; then
              {
                printf '%s' '<!DOCTYPE html><html><head><meta charset="utf-8"><title>'
                printf '%s' "$name"
                printf '%s' '</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;max-width:800px;margin:40px auto;padding:0 20px;line-height:1.6;color:#222;}h1,h2,h3{font-weight:500;}a{color:#0070f3;text-decoration:none;}a:hover{text-decoration:underline;}pre{background:#f5f5f5;padding:12px;border-radius:6px;overflow:auto;white-space:pre-wrap;}</style></head><body><pre>'
                cat "_site/$name/README.md"
                printf '%s' '</pre></body></html>'
              } > "_site/$name/index.html"
            fi
      
            if [ ! -f "_site/$name/index.html" ]; then
              echo "<h1>$name</h1>" > "_site/$name/index.html"
            fi
          done


      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
